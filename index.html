<style>
  :root{
    --bg-deep: #2B0F16;
    --bg-deep-2: #3B1220;
    --saffron: #E9A23B;
    --gold: #C9A24A;
    --cream: #F6E9D7;
    --ivory: #FFF8ED;
    --maroon-line: rgba(233,162,59,0.18);

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: radial-gradient(ellipse at top, var(--bg-deep-2) 0%, var(--bg-deep) 60%, #1C090D 100%);
    font-family: 'Karla', sans-serif;
    color: var(--cream);
    overflow-x: hidden;
    overflow-y: auto;
  }

  .stage {
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(14px, 2.4vh, 28px);
    padding: 4vh 20px;
    position: relative;
  }

  .backdrop .veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center 30%, rgba(43,15,22,0.25) 0%, rgba(28,9,13,0.55) 60%, var(--bg-deep) 100%),
      linear-gradient(180deg, rgba(28,9,13,0.35) 0%, rgba(28,9,13,0.45) 40%, var(--bg-deep) 90%);
  }

  .stage > *:not(.backdrop) {
    position: relative;
    z-index: 1;
  }

  /* ambient diya glow */
  .glow {
    position: absolute;
    width: 480px;
    height: 480px;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(233,162,59,0.16) 0%, rgba(233,162,59,0) 70%);
    pointer-events: none;
    z-index: 1;
  }

  .header-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.85;
    margin: 0;
    font-weight: 700;
  }

  .ram-title {
    font-family: 'Yatra One', cursive;
    font-size: clamp(34px, 8vw, 62px);
    color: var(--saffron);
    margin: 0;
    text-shadow: 0 0 24px rgba(233,162,59,0.35);
    letter-spacing: 0.02em;
    text-align: center;
  }

  .subtitle {
    font-size: 15px;
    color: var(--cream);
    opacity: 0.6;
    margin: 0;
    text-align: center;
  }

  .mala-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* Mala ring around the counter — doubles as the progress indicator */
  .mala-wrap {
    position: relative;
    width: min(320px, 78vw);
    height: min(320px, 78vw);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mala-ring {
    position: absolute;
    inset: 0;
  }

  .bead {
    fill: var(--maroon-line);
    transition: fill 0.5s ease, r 0.3s ease;
  }
  .bead.lit {
    fill: var(--gold);
  }

  .count-core {
    position: relative;
    z-index: 2;
    width: 68%;
    height: 68%;
    border-radius: 50%;
    background: linear-gradient(160deg, #452031, #2B0F16 70%);
    border: 1px solid rgba(233,162,59,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.4), 0 0 50px rgba(233,162,59,0.08);
  }

  .count-number {
    font-family: 'Yatra One', cursive;
    font-size: clamp(34px, 8vw, 52px);
    color: var(--ivory);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .count-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.8;
    margin-top: 8px;
  }

  .goal-caption {
    font-size: 13px;
    letter-spacing: 0.06em;
    text-align: center;
    color: var(--gold);
    opacity: 0.8;
    margin: 0;
  }

  .goal-caption.achieved {
    font-family: 'Yatra One', cursive;
    font-size: clamp(18px, 3vw, 24px);
    color: var(--saffron);
    opacity: 1;
    text-shadow: 0 0 16px rgba(233,162,59,0.4);
  }

  .buttons {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .jap-btn {
    appearance: none;
    border: 1px solid var(--gold);
    background: rgba(233,162,59,0.08);
    color: var(--saffron);
    font-family: 'Karla', sans-serif;
    font-weight: 700;
    font-size: 16px;
    padding: 14px 28px;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
    letter-spacing: 0.02em;
  }

  .jap-btn:hover {
    background: rgba(233,162,59,0.18);
    box-shadow: 0 0 20px rgba(233,162,59,0.25);
  }

  .jap-btn:active {
    transform: scale(0.96);
  }

  .jap-btn.primary {
    background: linear-gradient(180deg, var(--saffron), #C9822B);
    color: #2B0F16;
    border: none;
  }

  .jap-btn.primary:hover {
    box-shadow: 0 0 26px rgba(233,162,59,0.45);
  }

  .jap-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }
  .jap-btn:disabled:hover {
    background: rgba(233,162,59,0.08);
    box-shadow: none;
  }
  .jap-btn.primary:disabled {
    background: linear-gradient(180deg, var(--saffron), #C9822B);
    opacity: 0.35;
  }

  .timestamp {
    font-size: 13px;
    color: var(--cream);
    opacity: 0.55;
    letter-spacing: 0.03em;
    text-align: center;
  }

  .timestamp span {
    color: var(--gold);
    opacity: 1;
  }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(43,15,22,0.95);
    border: 1px solid var(--gold);
    color: var(--saffron);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    letter-spacing: 0.02em;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    .jap-btn, .bead, .toast { transition: none; }
  }

  .loading-note {
    font-size: 12px;
    opacity: 0.5;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="backdrop">
    <div class="photo"></div>
    <div class="veil"></div>
  </div>

  <div class="glow"></div>
  <div class="header-block">
    <div class="eyebrow">Naam Jap</div>
    <h1 class="ram-title">श्री राम जय राम जय जय राम</h1>
    <p class="subtitle">Every name counted is a step on the path</p>
  </div>

  <div id="loadingNote" class="loading-note">Loading your count…</div>

  <div class="mala-block">
    <div class="mala-wrap" id="malaWrap" style="display:none;">
      <svg class="mala-ring" id="malaSvg" viewBox="0 0 320 320"></svg>
      <div class="count-core">
        <div class="count-number" id="countNumber">0</div>
        <div class="count-label">Ram Naam Jap</div>
      </div>
    </div>
    <div class="goal-caption" id="goalCaption" style="display:none;">0% of 1,25,000 goal</div>
  </div>

  <div class="buttons" id="buttonsRow" style="display:none;">
    <button class="jap-btn" id="add500">+ 500 Jap</button>
    <button class="jap-btn primary" id="add1000">+ 1000 Jap</button>
  </div>

  <div class="timestamp" id="timestamp" style="display:none;">
    Last updated: <span id="lastUpdated">—</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const COUNT_KEY = 'ram-naam-count';
  const TIME_KEY = 'ram-naam-last-updated';
  const DEFAULT_COUNT = 0;
  const GOAL = 125000;
  const BEAD_COUNT = 54; // half a 108-bead mala, decorative

  const countNumberEl = document.getElementById('countNumber');
  const lastUpdatedEl = document.getElementById('lastUpdated');
  const timestampEl = document.getElementById('timestamp');
  const malaWrap = document.getElementById('malaWrap');
  const buttonsRow = document.getElementById('buttonsRow');
  const add500Btn = document.getElementById('add500');
  const add1000Btn = document.getElementById('add1000');
  const goalCaption = document.getElementById('goalCaption');
  const loadingNote = document.getElementById('loadingNote');
  const toast = document.getElementById('toast');
  const malaSvg = document.getElementById('malaSvg');

  let currentCount = DEFAULT_COUNT;

  function buildMala() {
    const cx = 160, cy = 160, r = 150, beadR = 6;
    let svgBeads = '';
    for (let i = 0; i < BEAD_COUNT; i++) {
      const angle = (i / BEAD_COUNT) * Math.PI * 2 - Math.PI / 2;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      svgBeads += `<circle class="bead" id="bead-${i}" cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${beadR}"></circle>`;
    }
    malaSvg.innerHTML = svgBeads;
  }

  function litBeadCount(count) {
    // beads now double as the progress ring toward the goal
    const pct = Math.min(1, count / GOAL);
    return Math.round(pct * BEAD_COUNT);
  }

  function updateMalaLighting(count) {
    const lit = litBeadCount(count);
    for (let i = 0; i < BEAD_COUNT; i++) {
      const bead = document.getElementById(`bead-${i}`);
      if (!bead) continue;
      if (i < lit) {
        bead.classList.add('lit');
      } else {
        bead.classList.remove('lit');
      }
    }
  }

  function formatTimestamp(date) {
    const pad = (n) => String(n).padStart(2, '0');
    const dd = pad(date.getDate());
    const mm = pad(date.getMonth() + 1);
    const yy = pad(date.getFullYear() % 100);
    const HH = pad(date.getHours());
    const MI = pad(date.getMinutes());
    return `${dd}/${mm}/${yy} ${HH}:${MI}`;
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function render() {
    countNumberEl.textContent = currentCount.toLocaleString('en-IN');
    updateMalaLighting(currentCount);

    const goalReached = currentCount >= GOAL;
    const pct = Math.min(100, (currentCount / GOAL) * 100);

    if (goalReached) {
      goalCaption.textContent = 'जय श्री राम 🙏';
      goalCaption.classList.add('achieved');
    } else {
      goalCaption.textContent = `${pct.toFixed(1)}% of 1,25,000 goal`;
      goalCaption.classList.remove('achieved');
    }

    add500Btn.disabled = goalReached;
    add1000Btn.disabled = goalReached;
  }

  async function loadState() {
    buildMala();
    try {
      const savedCount = localStorage.getItem(COUNT_KEY);
      currentCount = savedCount !== null ? JSON.parse(savedCount) : DEFAULT_COUNT;
    } catch (e) {
      currentCount = DEFAULT_COUNT;
    }
    try {
      const savedTime = localStorage.getItem(TIME_KEY);
      lastUpdatedEl.textContent = savedTime !== null ? savedTime : 'not yet updated';
    } catch (e) {
      lastUpdatedEl.textContent = 'not yet updated';
    }

    render();
    loadingNote.style.display = 'none';
    malaWrap.style.display = 'flex';
    buttonsRow.style.display = 'flex';
    goalCaption.style.display = 'block';
    timestampEl.style.display = 'block';
  }

  async function persist() {
    const now = formatTimestamp(new Date());
    try {
      localStorage.setItem(COUNT_KEY, JSON.stringify(currentCount));
      localStorage.setItem(TIME_KEY, now);
    } catch (e) {
      console.error('Could not save to localStorage', e);
    }
    lastUpdatedEl.textContent = now;
  }

  async function addJap(amount) {
    if (currentCount >= GOAL) return;
    currentCount += amount;
    render();
    await persist();
    if (currentCount >= GOAL) {
      showToast('जय श्री राम — लक्ष्य पूर्ण!');
    } else {
      showToast(`+${amount.toLocaleString('en-IN')} added — Jai Shree Ram`);
    }
  }

  document.getElementById('add500').addEventListener('click', () => addJap(500));
  document.getElementById('add1000').addEventListener('click', () => addJap(1000));

  loadState();
</script>

</body>
</html>
